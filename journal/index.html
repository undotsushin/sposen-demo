document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"773a1761-4eaf-428e-acbe-5e1e47ead30d\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>\n    html,body{margin:0;padding:0;height:100%}\n    body{--accent:#D50012;background:#F4F4F1}\n    *{box-sizing:border-box}\n    a{color:#1A1A1A;text-decoration:none}\n    a:hover{color:var(--accent)}\n    ::selection{background:rgba(213,0,18,.18)}\n    input::placeholder,textarea::placeholder{color:#B8B8B2}\n    @keyframes spin{to{transform:rotate(360deg)}}\n    @keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}\n    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"height:100vh;display:flex;flex-direction:column;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',Meiryo,sans-serif;color:#1A1A1A;overflow:hidden\">\n\n  <!-- ============ HEADER ============ -->\n  <div style=\"background:#0E0E0E;color:#FFFFFF;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:62px;flex:none\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <div style=\"width:26px;height:26px;background:var(--accent);flex:none\"><\u002Fdiv>\n      <div>\n        <div style=\"font-weight:900;letter-spacing:.14em;font-size:14px;line-height:1.2\">TOYOTA ATHLETE JOURNAL<\u002Fdiv>\n        <div style=\"font-size:10px;color:#9A9A9A;letter-spacing:.28em;margin-top:2px\">瓦版ジェネレーター ｜ DEMO<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ showSteps }}\" hint-placeholder-val=\"{{ false }}\">\n      <sc-if value=\"{{ notMobile }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:18px\">\n          <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:7px\">\n              <div style=\"width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;{{ st.cs }}\">{{ st.n }}<\u002Fdiv>\n              <span style=\"font-size:12px;letter-spacing:.04em;{{ st.ls }}\">{{ st.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;flex:none\">\n          <div style=\"width:22px;height:22px;border-radius:50%;background:var(--accent);color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700\">{{ stepNo }}<\u002Fdiv>\n          <span style=\"font-size:12px;color:#FFFFFF;font-weight:700\">{{ stepName }}<\u002Fspan>\n          <span style=\"font-size:11px;color:#777777\">{{ stepNo }}/4<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ LOGIN ============ -->\n  <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"ログイン\" style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;overflow:auto\">\n      <form sc-camel-on-submit=\"{{ doLogin }}\" style=\"width:100%;max-width:410px;background:#FFFFFF;border:1px solid #E5E5E1;padding:46px 42px 36px;box-shadow:0 14px 44px rgba(0,0,0,.07)\">\n        <div style=\"width:36px;height:6px;background:var(--accent);margin-bottom:20px\"><\u002Fdiv>\n        <div style=\"font-size:23px;font-weight:900;letter-spacing:.08em;line-height:1.35\">TOYOTA<br>ATHLETE JOURNAL<\u002Fdiv>\n        <div style=\"font-size:12px;color:#777777;margin-top:8px;letter-spacing:.12em\">アスリート瓦版ジェネレーター<\u002Fdiv>\n        <div style=\"margin-top:34px;display:flex;flex-direction:column;gap:18px\">\n          <div>\n            <label style=\"display:block;font-size:12px;font-weight:700;letter-spacing:.1em;color:#555555;margin-bottom:6px\">ID<\u002Flabel>\n            <input value=\"{{ lid }}\" sc-camel-on-change=\"{{ onLid }}\" style=\"width:100%;border:1px solid #D8D8D3;padding:12px 13px;font-size:14px;background:#FAFAF8;outline:none;font-family:inherit\" style-focus=\"border-color:#1A1A1A;background:#FFFFFF\">\n            <sc-if value=\"{{ idErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"color:var(--accent);font-size:12px;margin-top:5px;font-weight:500\">入力してください<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:12px;font-weight:700;letter-spacing:.1em;color:#555555;margin-bottom:6px\">パスワード<\u002Flabel>\n            <input type=\"password\" value=\"{{ lpw }}\" sc-camel-on-change=\"{{ onLpw }}\" style=\"width:100%;border:1px solid #D8D8D3;padding:12px 13px;font-size:14px;background:#FAFAF8;outline:none;font-family:inherit\" style-focus=\"border-color:#1A1A1A;background:#FFFFFF\">\n            <sc-if value=\"{{ pwErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"color:var(--accent);font-size:12px;margin-top:5px;font-weight:500\">入力してください<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"submit\" style=\"margin-top:30px;width:100%;background:var(--accent);color:#FFFFFF;border:none;padding:14px;font-size:14px;font-weight:700;letter-spacing:.24em;cursor:pointer;font-family:inherit\" style-hover=\"background:#A80010\">ログイン<\u002Fbutton>\n        <div style=\"margin-top:20px;font-size:11px;color:#999999;text-align:center;letter-spacing:.05em\">関係者専用のクローズドなサービスです<\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TEMPLATE SELECT ============ -->\n  <sc-if value=\"{{ isTemplate }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"テンプレート選択\" style=\"flex:1;overflow:auto;padding:clamp(24px,4vw,46px) clamp(16px,3vw,32px) 70px\">\n      <div style=\"max-width:1080px;margin:0 auto\">\n        <div style=\"font-size:12px;color:var(--accent);font-weight:800;letter-spacing:.3em\">STEP 1<\u002Fdiv>\n        <h1 style=\"margin:8px 0 8px;font-size:28px;font-weight:900;letter-spacing:.02em\">テンプレートを選ぶ<\u002Fh1>\n        <p style=\"margin:0 0 34px;color:#666666;font-size:14px\">伝えたい内容に合わせて選んでください。文章やレイアウトはあとから編集できます。<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:24px\">\n\n          <!-- card: report -->\n          <div sc-camel-on-click=\"{{ pick.report }}\" style=\"background:#FFFFFF;border:1px solid #E5E5E1;cursor:pointer;transition:all .15s ease\" style-hover=\"border-color:var(--accent);transform:translateY(-3px);box-shadow:0 16px 36px rgba(0,0,0,.09)\">\n            <div style=\"padding:18px 18px 0\">\n              <div style=\"aspect-ratio:210/262;background:#FFFFFF;border:1px solid #ECECE8;padding:13px;display:flex;flex-direction:column;gap:6px;overflow:hidden\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #1A1A1A;padding-bottom:5px\">\n                  <div style=\"width:34%;height:5px;background:var(--accent)\"><\u002Fdiv>\n                  <div style=\"width:20%;height:4px;background:#DDDDD8\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width:86%;height:11px;background:#1A1A1A;margin-top:3px\"><\u002Fdiv>\n                <div style=\"width:70%;height:5px;background:#D8D8D3\"><\u002Fdiv>\n                <div style=\"display:flex;gap:5px;margin-top:4px;height:34%\">\n                  <div style=\"flex:2.2;background:#E6E6E2\"><\u002Fdiv>\n                  <div style=\"flex:1;display:flex;flex-direction:column;gap:5px\">\n                    <div style=\"flex:1;background:#E6E6E2\"><\u002Fdiv>\n                    <div style=\"flex:1;background:#E6E6E2\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px;flex:1;margin-top:4px\">\n                  <div style=\"flex:1;display:flex;flex-direction:column;gap:4px\">\n                    <div style=\"height:4px;background:#D8D8D3\"><\u002Fdiv><div style=\"height:4px;background:#D8D8D3\"><\u002Fdiv><div style=\"height:4px;background:#D8D8D3\"><\u002Fdiv><div style=\"height:4px;background:#D8D8D3;width:70%\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;display:flex;flex-direction:column;gap:4px\">\n                    <div style=\"height:4px;background:#D8D8D3\"><\u002Fdiv><div style=\"height:4px;background:#D8D8D3\"><\u002Fdiv><div style=\"height:4px;background:#D8D8D3\"><\u002Fdiv><div style=\"height:4px;background:#D8D8D3;width:55%\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:16px 20px 20px\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <div style=\"width:8px;height:8px;background:var(--accent)\"><\u002Fdiv>\n                <div style=\"font-size:16px;font-weight:800\">近況レポート<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"margin:7px 0 0;font-size:12.5px;color:#666666;line-height:1.75\">練習の様子や日々の活動を伝える定期報告に。写真と2段組の本文で、読みごたえのある紙面。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- card: result -->\n          <div sc-camel-on-click=\"{{ pick.result }}\" style=\"background:#FFFFFF;border:1px solid #E5E5E1;cursor:pointer;transition:all .15s ease\" style-hover=\"border-color:var(--accent);transform:translateY(-3px);box-shadow:0 16px 36px rgba(0,0,0,.09)\">\n            <div style=\"padding:18px 18px 0\">\n              <div style=\"aspect-ratio:210/262;background:#FFFFFF;border:1px solid #ECECE8;display:flex;flex-direction:column;gap:6px;overflow:hidden\">\n                <div style=\"height:13%;background:#0E0E0E;display:flex;align-items:center;gap:5px;padding:0 10px\">\n                  <div style=\"width:7px;height:7px;background:var(--accent)\"><\u002Fdiv>\n                  <div style=\"width:40%;height:5px;background:#FFFFFF\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:4px 12px 12px;display:flex;flex-direction:column;gap:6px;flex:1\">\n                  <div style=\"width:30%;height:5px;background:var(--accent)\"><\u002Fdiv>\n                  <div style=\"width:92%;height:14px;background:#1A1A1A\"><\u002Fdiv>\n                  <div style=\"width:60%;height:14px;background:#1A1A1A\"><\u002Fdiv>\n                  <div style=\"height:36%;background:#E6E6E2;margin-top:4px\"><\u002Fdiv>\n                  <div style=\"height:12%;background:var(--accent)\"><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:4px;margin-top:3px\">\n                    <div style=\"height:4px;background:#D8D8D3\"><\u002Fdiv><div style=\"height:4px;background:#D8D8D3;width:80%\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:16px 20px 20px\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <div style=\"width:8px;height:8px;background:var(--accent)\"><\u002Fdiv>\n                <div style=\"font-size:16px;font-weight:800\">大会結果速報<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"margin:7px 0 0;font-size:12.5px;color:#666666;line-height:1.75\">大会・試合直後の結果報告に。大きな見出しと写真で、結果をひと目で伝えるレイアウト。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- card: aspiration -->\n          <div sc-camel-on-click=\"{{ pick.aspiration }}\" style=\"background:#FFFFFF;border:1px solid #E5E5E1;cursor:pointer;transition:all .15s ease\" style-hover=\"border-color:var(--accent);transform:translateY(-3px);box-shadow:0 16px 36px rgba(0,0,0,.09)\">\n            <div style=\"padding:18px 18px 0\">\n              <div style=\"aspect-ratio:210/262;background:#FFFFFF;border:1px solid #ECECE8;display:flex;flex-direction:column;overflow:hidden\">\n                <div style=\"height:42%;background:#E6E6E2\"><\u002Fdiv>\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px\">\n                  <div style=\"width:22px;height:4px;background:var(--accent)\"><\u002Fdiv>\n                  <div style=\"width:64%;height:11px;background:#1A1A1A;margin-top:2px\"><\u002Fdiv>\n                  <div style=\"width:44%;height:5px;background:#D8D8D3\"><\u002Fdiv>\n                  <div style=\"width:74%;height:4px;background:#D8D8D3;margin-top:8px\"><\u002Fdiv>\n                  <div style=\"width:74%;height:4px;background:#D8D8D3\"><\u002Fdiv>\n                  <div style=\"width:50%;height:4px;background:#D8D8D3\"><\u002Fdiv>\n                  <div style=\"width:36%;height:8px;background:#1A1A1A;margin-top:auto;align-self:flex-end\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:16px 20px 20px\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <div style=\"width:8px;height:8px;background:var(--accent)\"><\u002Fdiv>\n                <div style=\"font-size:16px;font-weight:800\">意気込み・抱負<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"margin:7px 0 0;font-size:12.5px;color:#666666;line-height:1.75\">大会前の決意表明や新シーズンの抱負に。写真と本人の言葉が主役の、余白を生かした紙面。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ INPUT FORM ============ -->\n  <sc-if value=\"{{ isForm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"入力フォーム\" style=\"flex:1;overflow:auto;padding:clamp(24px,4vw,46px) clamp(16px,3vw,32px) 80px\">\n      <div style=\"max-width:680px;margin:0 auto\">\n        <div style=\"font-size:12px;color:var(--accent);font-weight:800;letter-spacing:.3em\">STEP 2<\u002Fdiv>\n        <h1 style=\"margin:8px 0 8px;font-size:28px;font-weight:900;letter-spacing:.02em\">情報を入力する<\u002Fh1>\n        <p style=\"margin:0;color:#666666;font-size:14px\">選択中のテンプレート：<strong style=\"color:#1A1A1A\">{{ tplName }}<\u002Fstrong>　<a href=\"#\" sc-camel-on-click=\"{{ backToTpl }}\" style=\"font-size:13px;text-decoration:underline\">変更する<\u002Fa><\u002Fp>\n\n        <div style=\"margin-top:22px;background:#FFFFFF;border:1px solid #E5E5E1;padding:16px 20px;display:flex;align-items:center;gap:14px\">\n          <div style=\"width:10px;height:10px;background:var(--accent);flex:none\"><\u002Fdiv>\n          <div style=\"font-size:13px;color:#444444;line-height:1.7;flex:1\">必須は<strong>「名前」だけ<\u002Fstrong>。ただし、詳しく書くほどAIがより良い瓦版を作れます。<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ autofill }}\" style=\"flex:none;border:1px solid #C9C9C4;background:#FAFAF8;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;color:#555555;font-family:inherit\" style-hover=\"border-color:var(--accent);color:var(--accent)\">記入例を自動入力<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:26px;display:flex;flex-direction:column;gap:24px\">\n\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n              <label style=\"font-size:13.5px;font-weight:700\">名前<\u002Flabel>\n              <span style=\"font-size:10.5px;font-weight:700;color:#FFFFFF;background:var(--accent);padding:2px 8px;letter-spacing:.1em\">必須<\u002Fspan>\n            <\u002Fdiv>\n            <input value=\"{{ form.name }}\" sc-camel-on-change=\"{{ on.name }}\" placeholder=\"例）佐藤 拓海\" style=\"width:100%;border:1px solid #D8D8D3;padding:13px 14px;font-size:14.5px;background:#FFFFFF;outline:none;font-family:inherit;{{ nameBorder }}\" style-focus=\"border-color:#1A1A1A\">\n            <sc-if value=\"{{ nameErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"color:var(--accent);font-size:12px;margin-top:5px;font-weight:500\">名前を入力してください<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n                <label style=\"font-size:13.5px;font-weight:700\">所属・競技<\u002Flabel>\n                <span style=\"font-size:10.5px;font-weight:700;color:#888888;background:#EDEDEA;padding:2px 8px;letter-spacing:.1em\">任意<\u002Fspan>\n              <\u002Fdiv>\n              <input value=\"{{ form.aff }}\" sc-camel-on-change=\"{{ on.aff }}\" placeholder=\"例）陸上競技部 / 男子マラソン\" style=\"width:100%;border:1px solid #D8D8D3;padding:13px 14px;font-size:14.5px;background:#FFFFFF;outline:none;font-family:inherit\" style-focus=\"border-color:#1A1A1A\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n                <label style=\"font-size:13.5px;font-weight:700\">大会名・イベント名<\u002Flabel>\n                <span style=\"font-size:10.5px;font-weight:700;color:#888888;background:#EDEDEA;padding:2px 8px;letter-spacing:.1em\">任意<\u002Fspan>\n              <\u002Fdiv>\n              <input value=\"{{ form.event }}\" sc-camel-on-change=\"{{ on.event }}\" placeholder=\"例）東京国際マラソン 2026\" style=\"width:100%;border:1px solid #D8D8D3;padding:13px 14px;font-size:14.5px;background:#FFFFFF;outline:none;font-family:inherit\" style-focus=\"border-color:#1A1A1A\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n              <label style=\"font-size:13.5px;font-weight:700\">伝えたいこと（本文）<\u002Flabel>\n              <span style=\"font-size:10.5px;font-weight:700;color:#888888;background:#EDEDEA;padding:2px 8px;letter-spacing:.1em\">任意<\u002Fspan>\n            <\u002Fdiv>\n            <texta der:1px solid #D5D5D2;' : '') + (curColor === c ? 'box-shadow:0 0 0 2px #FFFFFF,0 0 0 4px var(--accent);' : ''),\n      set: () => this.setEl('color', c)\n    }));\n\n    const expBtns = [['PPT', 'PPTで出力'], ['PDF', 'PDFで出力'], ['JPEG', 'JPEGで出力']].map(([fmt, label]) => ({\n      label, on: () => this.setState({ modalFmt: fmt })\n    }));\n\n    return {\n      isLogin: scr === 'login', isTemplate: scr === 'template', isForm: scr === 'form',\n      isGenerating: scr === 'generating', isPreview: scr === 'preview',\n      showSteps: scr !== 'login',\n      steps,\n      isMobile, notMobile: !isMobile,\n      stepNo: (stepIdx ?? 0) + 1,\n      stepName: ['テンプレート選択', '情報入力', 'AI生成', 'プレビュー・出力'][stepIdx ?? 0],\n      pvRootSt: isMobile ? 'flex-direction:column;overflow:auto;' : '',\n      pvMainSt: isMobile ? 'flex:none;' : '',\n      sheetAreaSt: isMobile ? 'flex:none;overflow:visible;' : '',\n      panelSt: isMobile ? 'width:100%;border-left:none;border-top:1px solid #E5E5E1;overflow:visible;' : '',\n      hintDisp: isMobile ? 'display:none;' : '',\n\n      lid: s.lid, lpw: s.lpw, idErr: s.idErr, pwErr: s.pwErr,\n      onLid: (e) => this.setState({ lid: e.target.value, idErr: false }),\n      onLpw: (e) => this.setState({ lpw: e.target.value, pwErr: false }),\n      doLogin: (e) => {\n        e.preventDefault();\n        const idErr = !s.lid.trim(), pwErr = !s.lpw.trim();\n        if (idErr || pwErr) { this.setState({ idErr, pwErr }); return; }\n        this.setState({ screen: 'template' });\n      },\n\n      pick,\n      tplName: this.TPL_NAMES[s.template] || '',\n\n      form: f, on,\n      nameErr: s.nameErr,\n      nameBorder: s.nameErr ? 'border-color:var(--accent);' : '',\n      bodyPh: this.BODY_PH[s.template] || this.BODY_PH.report,\n      backToTpl: (e) => { e.preventDefault(); this.setState({ screen: 'template' }); },\n      autofill: () => this.setState(st => ({\n        nameErr: false,\n        form: {\n          ...st.form,\n          name: '佐藤 拓海',\n          aff: '陸上競技部 / 男子マラソン',\n          event: '東京国際マラソン 2026',\n          body: '東京国際マラソンで自己ベストを7秒更新し、日本人3位でフィニッシュしました。30km過ぎで一度離されかけましたが、沿道の「トヨタがんばれ！」の声に何度も救われました。支えてくださった皆さんに心から感謝しています。次はマラソングランドチャンピオンシップで代表の座を掴みにいきます。'\n        }\n      })),\n      openFormFile: () => { if (this.formFileRef.current) this.formFileRef.current.click(); },\n      formFileRef: this.formFileRef,\n      onFormFiles: (e) => {\n        const files = [...e.target.files];\n        e.target.value = '';\n        this.setState(st => {\n          const ps = [...st.form.photos];\n          files.forEach(file => {\n            const slot = ps.findIndex(p => !p);\n            if (slot === -1) return;\n            ps[slot] = URL.createObjectURL(file);\n          });\n          return { form: { ...st.form, photos: ps } };\n        });\n      },\n      thumbs, hasThumbs: thumbs.length > 0, photoCount,\n      submitForm: () => {\n        if (!f.name.trim()) { this.setState({ nameErr: true }); return; }\n        const doc = this.buildDoc();\n        this.setState({\n          doc, nameErr: false, screen: 'generating', msgIdx: 0,\n          elStyles: {}, selectedEl: null,\n          sheetFont: s.template === 'aspiration' ? 'mincho' : 'gothic'\n        });\n        this.startGeneration();\n      },\n\n      genMsg: this.MSGS[s.msgIdx],\n      progPct: Math.round((s.msgIdx + 1) / 5 * 100) + '%',\n\n      doc: s.doc || {},\n      isReport: s.template === 'report', isResult: s.template === 'result', isAspiration: s.template === 'aspiration',\n      hasEvent: !!(s.doc && s.doc.event),\n      ov, sel, blur, pvSt, pvEmpty, pvLabel, phClick,\n      scaleV: scale,\n      wrapW: Math.round(794 * scale), wrapH: Math.round(1123 * scale),\n      sheetFF,\n      backToForm: (e) => { e.preventDefault(); this.setState({ screen: 'form', selectedEl: null }); },\n      deselect: () => { if (s.selectedEl) this.setState({ selectedEl: null }); },\n      deselectLink: (e) => { e.preventDefault(); this.setState({ selectedEl: null }); },\n\n      sheetGothic: () => this.setState({ sheetFont: 'gothic' }),\n      sheetMincho: () => this.setState({ sheetFont: 'mincho' }),\n      shGothicSt: seg(s.sheetFont === 'gothic'),\n      shMinchoSt: seg(s.sheetFont === 'mincho'),\n      hasSel: !!selK, noSel: !selK,\n      selLabel: selK ? this.LABELS[selK] : '',\n      selFs: curFs,\n      elGothic: () => this.setEl('ff', this.GOTHIC),\n      elMincho: () => this.setEl('ff', this.MINCHO),\n      ffGothicSt: seg(effFF === this.GOTHIC),\n      ffMinchoSt: seg(effFF === this.MINCHO),\n      fsUp: () => this.setEl('fs', Math.min(curFs + 2, 96)),\n      fsDown: () => this.setEl('fs', Math.max(curFs - 2, 9)),\n      swatches,\n      replaceRef: this.replaceRef,\n      onReplaceFile: (e) => {\n        const file = e.target.files[0];\n        e.target.value = '';\n        if (!file) return;\n        const idx = this._replaceIdx;\n        const url = URL.createObjectURL(file);\n        this.setState(st => {\n          const ps = [...st.form.photos]; ps[idx] = url;\n          return { form: { ...st.form, photos: ps } };\n        });\n      },\n\n      expBtns,\n      hasModal: !!s.modalFmt,\n      modalFmt: s.modalFmt || '',\n      closeModal: () => this.setState({ modalFmt: null }),\n      stopProp: (e) => e.stopPropagation()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
